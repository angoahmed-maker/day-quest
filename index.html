<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Day Quest OS</title>
<style>
:root{
  --bg:#0f1115;
  --panel:#171a21;
  --panel2:#1d2330;
  --accent:#7aa2ff;
  --accent2:#59d38c;
  --text:#ffffff;
  --muted:#a7b0bd;
  --border:#2a2f3a;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,system-ui;background:linear-gradient(180deg,#0f1115,#121826);color:var(--text)}
.wrap{padding:16px;max-width:980px;margin:auto}
.card{background:rgba(23,26,33,0.95);border:1px solid var(--border);border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:0 10px 30px rgba(0,0,0,0.3)}
h1{margin:0;font-size:28px}
.sub{color:var(--muted);font-size:14px;margin-top:6px}
.phase{font-size:13px;color:var(--muted);text-transform:uppercase}
.next{font-size:26px;font-weight:700;margin-top:6px}
.row{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:10px 14px;border:none;border-radius:12px;background:var(--accent);color:white;cursor:pointer;font-weight:600}
.btn.secondary{background:var(--panel2);border:1px solid var(--border)}
.item{padding:10px;border-radius:10px;margin-top:6px;background:var(--panel2)}
.timer{font-size:22px;font-weight:700;color:var(--accent2);margin-top:6px}
.highlight{margin-top:12px;padding:14px;border-radius:14px;background:rgba(122,162,255,0.08)}
input{padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--panel2);color:white}
</style>
</head>
<body>
<div class="wrap">

<div class="card">
  <div class="phase" id="phase"></div>
  <div class="next" id="next"></div>

  <div class="highlight">
    <div class="timer" id="timerDisplay"></div>
    <div class="row">
      <button class="btn" onclick="beginStep()">Begin</button>
      <button class="btn secondary" onclick="complete()">Done</button>
    </div>
  </div>
</div>

<div class="card">
  <h3>2UP Tracking</h3>
  <button class="btn" onclick="logCheck()">Checked Window</button>
  <button class="btn secondary" onclick="logBet()">Placed Bet</button>
  <div id="betStats" class="highlight"></div>
</div>

<div class="card">
  <h3>Spend Tracker</h3>
  <div class="row">
    <input id="amount" type="number" placeholder="Amount">
    <input id="note" placeholder="Note">
    <button class="btn" onclick="addSpend()">Add</button>
  </div>
  <div id="summary" class="highlight"></div>
</div>

<div class="card">
  <h3>Road to $1M</h3>
  <div class="row">
    <input id="networth" type="number" placeholder="Current Net Worth">
    <button class="btn" onclick="setNetWorth()">Update</button>
  </div>
  <div id="millionStats" class="highlight"></div>
</div>

</div>

<script>
let state = JSON.parse(localStorage.getItem('dq')||"{}");
if(!state.index) state.index=0;
if(!state.spending) state.spending=[];
if(!state.checks) state.checks=0;
if(!state.bets) state.bets=0;
if(!state.networth) state.networth=16000;

const flow=[
"Wake","Water","Shower","Eat","2UP Check","Gym","Work","Chinese","Dinner","Focus","Hobby","Brain Off","Plan","Sleep"
];

function render(){
  const target = 1000000;
  const progress = (state.networth/target)*100;

  document.getElementById('next').innerText=flow[state.index]||'Done';
  document.getElementById('phase').innerText=state.index<5?'Morning':state.index<9?'Work':'Night';
  document.getElementById('betStats').innerText=`Checks: ${state.checks} | Bets: ${state.bets}`;
  let total=0;
  state.spending.forEach(s=>total+=s.amount);
  document.getElementById('summary').innerText=`Spent $${total}`;
  document.getElementById('millionStats').innerText=`$${state.networth.toLocaleString()} / $1,000,000 (${progress.toFixed(2)}%)`;
  localStorage.setItem('dq',JSON.stringify(state));
}

function beginStep(){document.getElementById('timerDisplay').innerText='Running...'}
function complete(){state.index++;render()}
function logCheck(){state.checks++;render()}
function logBet(){state.bets++;render()}
function setNetWorth(){
  const val=Number(document.getElementById('networth').value);
  if(val) state.networth=val;
  render();
}

function addSpend(){
  const amt=Number(document.getElementById('amount').value);
  const note=document.getElementById('note').value;
  if(!amt) return;
  state.spending.push({amount:amt,note});
  render();
}

render();
</script>
</body>
</html>
